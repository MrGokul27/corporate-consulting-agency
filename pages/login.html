<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Stackly Corporate Consulting</title>
    <meta
      name="description"
      content="Login to your Stackly Corporate Consulting account."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      rel="stylesheet"
    />
    <link
      rel="icon"
      type="image/webp"
      href="../assets/images/logoStackly.webp"
    />
    <link href="../assets/css/styles.css" rel="stylesheet" />
    <link href="../assets/css/auth.css" rel="stylesheet" />
  </head>
  <body class="auth-body">
    <div class="auth-bg-overlay"></div>

    <div class="auth-wrapper">
      <div class="auth-card">
        <!-- Logo -->
        <div class="auth-logo-wrap">
          <a href="../index.html">
            <img
              src="../assets/images/logoStackly.webp"
              alt="Stackly Logo"
              class="auth-logo"
            />
          </a>
        </div>

        <div class="auth-header">
          <h2 class="auth-title">Welcome Back</h2>
          <p class="auth-subtitle">Sign in to your account to continue</p>
        </div>

        <form id="loginForm" class="needs-validation" novalidate>
          <!-- Role -->
          <div class="mb-3">
            <label for="loginRole" class="form-label auth-label">Role</label>
            <div class="input-group auth-input-group">
              <span class="input-group-text auth-input-icon"
                ><i class="fas fa-user-tie"></i
              ></span>
              <select class="form-select auth-select" id="loginRole" required>
                <option value="" disabled selected>Select your role</option>
                <option value="executive">Executive / C-Suite</option>
                <option value="manager">Senior Manager</option>
                <option value="consultant">Consultant</option>
                <option value="analyst">Analyst</option>
                <option value="client">Client</option>
              </select>
              <div class="invalid-feedback">Please select your role.</div>
            </div>
          </div>

          <!-- Email -->
          <div class="mb-3">
            <label for="loginEmail" class="form-label auth-label"
              >Email Address</label
            >
            <div class="input-group auth-input-group">
              <span class="input-group-text auth-input-icon"
                ><i class="fas fa-envelope"></i
              ></span>
              <input
                type="email"
                class="form-control auth-input"
                id="loginEmail"
                placeholder="you@company.com"
                required
              />
              <div class="invalid-feedback">
                Please enter a valid email address.
              </div>
            </div>
          </div>

          <!-- Password -->
          <div class="mb-3">
            <label for="loginPassword" class="form-label auth-label"
              >Password</label
            >
            <div class="input-group auth-input-group">
              <span class="input-group-text auth-input-icon"
                ><i class="fas fa-lock"></i
              ></span>
              <input
                type="password"
                class="form-control auth-input"
                id="loginPassword"
                placeholder="Enter your password"
                required
                minlength="6"
              />
              <button
                class="btn auth-eye-btn"
                type="button"
                id="toggleLoginPassword"
                tabindex="-1"
              >
                <i class="fas fa-eye" id="loginEyeIcon"></i>
              </button>
              <div class="invalid-feedback">
                Password must be at least 6 characters.
              </div>
            </div>
            <!-- Password Strength -->
            <div
              class="password-strength-wrap mt-2"
              id="loginStrengthWrap"
              style="display: none"
            >
              <div class="strength-bar-track">
                <div class="strength-bar-fill" id="loginStrengthBar"></div>
              </div>
              <span class="strength-label" id="loginStrengthLabel"></span>
            </div>
          </div>

          <!-- Remember Me -->
          <div class="mb-4 d-flex align-items-center justify-content-between">
            <div class="form-check auth-check">
              <input class="form-check-input" type="checkbox" id="rememberMe" />
              <label class="form-check-label auth-check-label" for="rememberMe"
                >Remember me</label
              >
            </div>
            <a href="#" class="auth-forgot-link">Forgot password?</a>
          </div>

          <!-- Submit -->
          <button type="submit" class="btn btn-accent w-100 auth-submit-btn">
            <span>Sign In</span>
            <i class="fas fa-arrow-right ms-2"></i>
          </button>

          <p class="auth-switch-text mt-4">
            Don't have an account?
            <a href="register.html" class="auth-switch-link">Create one</a>
          </p>
        </form>

        <!-- Back to Home -->
        <div class="auth-back-home">
          <a href="../index.html" class="auth-back-btn">
            <i class="fas fa-arrow-left me-2"></i>Back to Home
          </a>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/404-redirect.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard | Stackly Corporate Consulting</title>
    <meta
      name="description"
      content="Your Stackly Corporate Consulting dashboard."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      rel="stylesheet"
    />
    <link
      rel="icon"
      type="image/webp"
      href="../assets/images/logoStackly.webp"
    />
    <link href="../assets/css/styles.css" rel="stylesheet" />
    <link href="../assets/css/dashboard.css" rel="stylesheet" />
  </head>
  <body class="dashboard-body">
    <!-- ── Topbar ── -->
    <header class="db-topbar">
      <button
        class="db-sidebar-toggle"
        id="db-sidebar-toggle"
        aria-label="Toggle sidebar"
      >
        <i class="fas fa-bars"></i>
      </button>

      <a href="../index.html" class="db-topbar-logo">
        <img src="../assets/images/logoStackly.webp" alt="Stackly" />
      </a>

      <div class="db-topbar-divider"></div>
      <span class="db-topbar-title" id="db-topbar-title">Dashboard</span>

      <div class="db-topbar-actions">
        <!-- Notifications -->
        <button class="db-topbar-icon-btn" title="Notifications">
          <i class="fas fa-bell"></i>
          <span class="db-notif-badge"></span>
        </button>

        <!-- Settings -->
        <button class="db-topbar-icon-btn" title="Settings">
          <i class="fas fa-gear"></i>
        </button>

        <!-- User pill -->
        <div class="db-user-pill">
          <div class="db-user-avatar" id="db-user-avatar">--</div>
          <div>
            <div class="db-user-name" id="db-user-name">Loading...</div>
            <div class="db-user-role-badge" id="db-user-role-badge">Role</div>
          </div>
        </div>
      </div>
    </header>

    <!-- ── Sidebar Overlay (mobile) ── -->
    <div class="db-sidebar-overlay" id="db-sidebar-overlay"></div>

    <!-- ── Layout ── -->
    <div class="db-layout">
      <!-- ── Sidebar ── -->
      <aside class="db-sidebar" id="db-sidebar">
        <div class="db-sidebar-inner">
          <!-- Nav items injected by JS -->
          <nav id="db-sidebar-nav"></nav>
        </div>

        <div class="db-sidebar-footer">
          <button class="db-logout-btn" id="db-logout-btn">
            <i class="fas fa-right-from-bracket"></i>
            <span>Sign Out</span>
          </button>
        </div>
      </aside>

      <!-- ── Main Content ── -->
      <main class="db-main">
        <!-- Page Header -->
        <div class="db-page-header">
          <div class="db-page-header-top">
            <div>
              <h1 class="db-greeting" id="db-greeting">Good Morning 👋</h1>
              <p class="db-greeting-sub" id="db-greeting-sub">
                Welcome to your dashboard.
              </p>
            </div>
            <div class="db-date-badge" id="db-date-badge">
              <i class="fas fa-calendar-days"></i>
              <span>Loading date...</span>
            </div>
          </div>
          <!-- Gold rule -->
          <div class="db-gold-rule mt-3">
            <div class="db-gold-rule-line"></div>
            <div class="db-gold-rule-diamond"></div>
            <div
              class="db-gold-rule-line"
              style="
                background: linear-gradient(
                  90deg,
                  transparent,
                  var(--accent-color)
                );
              "
            ></div>
          </div>
        </div>

        <!-- ── Stat Cards ── -->
        <div class="row g-3 mb-4" id="db-stats-row">
          <!-- Injected by JS -->
        </div>

        <!-- ── Row: Profile + Quick Actions + Progress ── -->
        <div class="row g-3 mb-4">
          <!-- Profile Card -->
          <div class="col-12 col-md-4 col-xl-3">
            <div class="db-profile-card h-100">
              <div class="db-profile-avatar-lg" id="db-profile-avatar-lg">
                --
              </div>
              <div class="db-profile-name" id="db-profile-name">Loading...</div>
              <div class="db-profile-email" id="db-profile-email">
                user@company.com
              </div>
              <div class="db-profile-role-tag" id="db-profile-role-tag">
                <i class="fas fa-user-tie"></i> Role
              </div>
              <div
                class="mt-3 pt-3"
                style="border-top: 1px solid rgba(255, 255, 255, 0.1)"
              >
                <div
                  class="d-flex justify-content-between"
                  style="font-size: 0.78rem; color: rgba(255, 255, 255, 0.55)"
                >
                  <span>Session Active</span>
                  <span style="color: var(--accent-color); font-weight: 600"
                    >● Online</span
                  >
                </div>
              </div>
            </div>
          </div>

          <!-- Quick Actions -->
          <div class="col-12 col-md-4 col-xl-3">
            <div class="db-section-card h-100">
              <div class="db-section-header">
                <h6 class="db-section-title">
                  <i class="fas fa-bolt"></i>Quick Actions
                </h6>
              </div>
              <div class="db-section-body">
                <div class="db-quick-actions" id="db-quick-actions">
                  <!-- Injected by JS -->
                </div>
              </div>
            </div>
          </div>

          <!-- Performance Progress -->
          <div class="col-12 col-md-4 col-xl-3">
            <div class="db-section-card h-100">
              <div class="db-section-header">
                <h6 class="db-section-title">
                  <i class="fas fa-gauge-high"></i>Performance
                </h6>
              </div>
              <div class="db-section-body" id="db-progress-section">
                <!-- Injected by JS -->
              </div>
            </div>
          </div>

          <!-- Activity Feed -->
          <div class="col-12 col-xl-3">
            <div class="db-section-card h-100">
              <div class="db-section-header">
                <h6 class="db-section-title">
                  <i class="fas fa-clock-rotate-left"></i>Recent Activity
                </h6>
                <a href="#" class="db-view-all"
                  >All <i class="fas fa-arrow-right"></i
                ></a>
              </div>
              <div class="db-section-body" id="db-activity-feed">
                <!-- Injected by JS -->
              </div>
            </div>
          </div>
        </div>

        <!-- ── Table Section ── -->
        <div id="db-table-section">
          <!-- Injected by JS -->
        </div>

        <!-- ── Footer note ── -->
        <div
          class="mt-4 pt-3"
          style="
            border-top: 1px solid rgba(12, 43, 39, 0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
          "
        >
          <span style="font-size: 0.75rem; color: var(--text-muted)">
            © 2026 Stackly Corporate Consulting. All rights reserved.
          </span>
          <span style="font-size: 0.75rem; color: var(--text-muted)">
            <i
              class="fas fa-shield-halved"
              style="color: var(--accent-color); margin-right: 4px"
            ></i>
            Secure Session
          </span>
        </div>
      </main>
    </div>
    <!-- /.db-layout -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/dashboard.js"></script>
  </body>
</html>
